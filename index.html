<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HearAble Dashboard</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-box">H</div>
            <span class="brand-name">HearAble</span>
        </div>
        <div class="nav-center">
            <button class="nav-link active" data-target="home-view">
                <span class="icon">🏠</span> Home
            </button>
            <button class="nav-link" data-target="jobs-view">
                <span class="icon">💼</span> Job Postings
            </button>
            
            <button class="nav-link admin-only" data-target="graduates-view">
                <span class="icon">🎓</span> Graduates
            </button>
            <button class="nav-link admin-only" data-target="companies-view">
                <span class="icon">🏢</span> Companies
            </button>

            <button class="nav-link" data-target="account-view">
                <span class="icon">👤</span> Account
            </button>
        </div>
        <div class="nav-right">
            <div class="notification-wrapper">
                <span class="bell-icon">🔔</span>
                <span class="badge">2</span>
            </div>
            <div class="user-avatar">JG</div>
        </div>
    </nav>

    <main class="container">
        
        <div id="home-view" class="view-section active"></div>
        <div id="jobs-view" class="view-section"></div>
        <div id="graduates-view" class="view-section"></div>
        <div id="companies-view" class="view-section"></div>
        <div id="job-details-view" class="view-section"></div>
        <div id="account-view" class="view-section"></div>

    </main>

    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script src="views.js"></script> <script src="rendering.js"></script>
    <script src="navigation.js"></script>
    <script src="modals.js"></script>
    <script src="user.js"></script>
</body>
</html>
